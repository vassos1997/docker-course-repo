server {
    listen 80;

    # 1. Serve the React SPA
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This is critical for React Router (Single Page Applications)
        # If Nginx doesn't find a file matching the URL, it returns index.html
        try_files $uri $uri/ /index.html;
    }

    # 2. Reverse Proxy for the Backend API
    # Any request starting with /api/ will be intercepted by Nginx
    location /api/ {
        # Forward the request to the backend container
        # Since they are in the same ECS Task, they share 'localhost'
        # We will configure the backend to listen on port 5000 via ECS Environment Variables
        proxy_pass http://localhost:5000;
        
        # Standard proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
